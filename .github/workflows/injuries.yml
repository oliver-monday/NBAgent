name: Injuries Refresh

on:
  schedule:
    - cron: "45 17 * * *"   # 10:45 AM PT (PDT = UTC-7)
    - cron: "15 18 * * *"   # 11:15 AM PT
    - cron: "45 18 * * *"   # 11:45 AM PT
    - cron: "15 19 * * *"   # 12:15 PM PT
    - cron: "45 19 * * *"   # 12:45 PM PT
    - cron: "15 20 * * *"   #  1:15 PM PT
    - cron: "45 20 * * *"   #  1:45 PM PT
    - cron: "15 21 * * *"   #  2:15 PM PT
    - cron: "45 21 * * *"   #  2:45 PM PT
    - cron: "15 22 * * *"   #  3:15 PM PT
    - cron: "45 22 * * *"   #  3:45 PM PT
    - cron: "15 23 * * *"   #  4:15 PM PT
    - cron: "45 23 * * *"   #  4:45 PM PT
    - cron: "15 0 * * *"    #  5:15 PM PT
    - cron: "45 0 * * *"    #  5:45 PM PT
    - cron: "15 1 * * *"    #  6:15 PM PT
    - cron: "45 1 * * *"    #  6:45 PM PT
    - cron: "15 2 * * *"    #  7:15 PM PT
    - cron: "45 2 * * *"    #  7:45 PM PT (last run — with GitHub lag, actual ~8:00-8:30 PM)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: injuries-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml anthropic

      - name: Refresh Rotowire injuries
        env:
          ROTOWIRE_EMAIL: ${{ secrets.ROTOWIRE_EMAIL }}
          ROTOWIRE_PASSWORD: ${{ secrets.ROTOWIRE_PASSWORD }}
        run: |
          SLATE_DATE="$(TZ=America/Los_Angeles date +%Y-%m-%d)"
          python ingest/rotowire_injuries_only.py --date "$SLATE_DATE"

      - name: Commit injuries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save freshly-generated data files before syncing with remote
          for f in "data/injuries_today.json" "data/lineups_today.json" "logs/injury_log.csv"; do
            [ -f "$f" ] && cp "$f" "$f.local"
          done

          # Clean working tree, fast-forward to remote, then restore local files
          git checkout -- . 2>/dev/null || true
          git pull --rebase origin main

          for f in "data/injuries_today.json" "data/lineups_today.json" "logs/injury_log.csv"; do
            [ -f "$f.local" ] && mv "$f.local" "$f"
          done

          CHANGED=0
          for f in "data/injuries_today.json" "data/lineups_today.json" "logs/injury_log.csv"; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "No injury changes to commit."
            exit 0
          fi

          git commit -m "Injuries refresh [skip ci]"
          git push origin HEAD:main

      - name: Run lineup watch
        run: |
          python agents/lineup_watch.py

      - name: Commit picks status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          [ -f "data/picks.json" ] && cp "data/picks.json" "data/picks.json.local"

          git checkout -- . 2>/dev/null || true
          git pull --rebase origin main

          # Save origin's picks.json (post-pull) for merge comparison
          [ -f "data/picks.json" ] && cp "data/picks.json" "data/picks.json.origin"

          # Merge guard: if origin has more today-picks than local, analyst
          # pushed a new pick set between our checkout and now — use origin as
          # base and overlay local's injury mutations (voided, void_reason,
          # lineup_risk, injury_status_at_check, injury_check_time, lineup_update).
          # On any error, falls back to local copy (preserves pre-guard behavior).
          if [ -f "data/picks.json.local" ] && [ -f "data/picks.json.origin" ]; then
            python ingest/merge_picks.py \
              --local "data/picks.json.local" \
              --origin "data/picks.json.origin" \
              --output "data/picks.json"
            rm -f "data/picks.json.local" "data/picks.json.origin"
          elif [ -f "data/picks.json.local" ]; then
            mv "data/picks.json.local" "data/picks.json"
          fi

          if [ -n "$(git status --porcelain -- data/picks.json)" ]; then
            git add data/picks.json
            git commit -m "Lineup watch: picks status updated [skip ci]"
            git push origin HEAD:main
          else
            echo "No picks status changes to commit."
          fi

      - name: Run lineup update agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/lineup_update.py

      - name: Commit lineup amendments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for f in "data/picks.json" "data/opportunity_flags.json"; do
            [ -f "$f" ] && cp "$f" "$f.local"
          done

          git checkout -- . 2>/dev/null || true
          git pull --rebase origin main

          # Save origin's picks.json (post-pull) for merge comparison
          [ -f "data/picks.json" ] && cp "data/picks.json" "data/picks.json.origin"

          # Restore non-picks files directly; picks.json is handled by merge guard below
          for f in "data/picks.json" "data/opportunity_flags.json"; do
            if [ "$f" = "data/picks.json" ]; then
              continue  # handled by merge guard
            fi
            [ -f "$f.local" ] && mv "$f.local" "$f"
          done

          # Merge guard: if origin has more today-picks than local, analyst
          # pushed a new pick set between our checkout and now — use origin as
          # base and overlay local's injury mutations (voided, void_reason,
          # lineup_risk, injury_status_at_check, injury_check_time, lineup_update).
          # On any error, falls back to local copy (preserves pre-guard behavior).
          if [ -f "data/picks.json.local" ] && [ -f "data/picks.json.origin" ]; then
            python ingest/merge_picks.py \
              --local "data/picks.json.local" \
              --origin "data/picks.json.origin" \
              --output "data/picks.json"
            rm -f "data/picks.json.local" "data/picks.json.origin"
          elif [ -f "data/picks.json.local" ]; then
            mv "data/picks.json.local" "data/picks.json"
          fi

          CHANGED=0
          for f in "data/picks.json" "data/opportunity_flags.json"; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 1 ]; then
            git commit -m "Lineup update: picks amended [skip ci]"
            git push origin HEAD:main
          else
            echo "No lineup amendments to commit."
          fi

      - name: Rebuild frontend with updated injuries
        run: |
          pip install pandas
          python agents/build_site.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
