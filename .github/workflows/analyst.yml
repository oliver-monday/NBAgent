name: Analyst Agent

on:
  # Chains off the Auditor completing — ensures audit feedback is written first
  workflow_run:
    workflows: ["Auditor Agent"]
    types: [completed]
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: analyst
  cancel-in-progress: false

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy anthropic requests

      - name: Refresh injuries before picks
        env:
          ROTOWIRE_EMAIL: ${{ secrets.ROTOWIRE_EMAIL }}
          ROTOWIRE_PASSWORD: ${{ secrets.ROTOWIRE_PASSWORD }}
        run: |
          pip install beautifulsoup4 lxml
          SLATE_DATE="$(TZ=America/Los_Angeles date +%Y-%m-%d)"
          python ingest/rotowire_injuries_only.py --date "$SLATE_DATE"

      - name: Run Quant agent
        run: python agents/quant.py

      - name: Run Pre-Game Reporter
        run: python agents/pre_game_reporter.py

      - name: Run Analyst agent
        run: python agents/analyst.py

      - name: Run Parlay agent
        run: python agents/parlay.py

      - name: Commit picks and parlays
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase --autostash origin/main

          CHANGED=0
          for f in "data/picks.json" "data/parlays.json" "data/player_stats.json" "data/lineups_today.json" "data/skipped_picks.json"; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "No changes to commit."
          else
            git commit -m "Analyst + Parlay picks $(TZ=America/Los_Angeles date +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          fi

      - name: Build and deploy frontend
        run: python agents/build_site.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
