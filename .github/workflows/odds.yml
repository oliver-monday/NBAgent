name: Odds Agent

on:
  # Manual trigger only — primary odds flow is now in analyst.yml
  # Use this for mid-day re-fetches when lineups change
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: odds
  cancel-in-progress: false

jobs:
  fetch-odds:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch odds
        run: python ingest/odds_today.py

      - name: Commit odds data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILES="data/picks.json data/odds_today.json"
          for f in $FILES; do
            [ -f "$f" ] && cp "$f" "$f.local"
          done

          git checkout -- . 2>/dev/null || true
          git pull --rebase origin main

          for f in $FILES; do
            [ -f "$f.local" ] && mv "$f.local" "$f"
          done

          CHANGED=0
          for f in $FILES; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "No odds changes to commit."
          else
            git commit -m "Odds data $(TZ=America/Los_Angeles date +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          fi
