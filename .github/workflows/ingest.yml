name: Daily Ingest

on:
  schedule:
    - cron: "0 13 * * *"   # 8:00 AM ET (13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy requests beautifulsoup4 lxml

      - name: Ingest ESPN scores (yesterday + backfill)
        run: |
          python ingest/espn_daily_ingest.py \
            --out data/nba_master.csv \
            --max-backfill-days 7

      - name: Ingest player game logs (yesterday)
        run: |
          python ingest/espn_player_ingest.py \
            --mode yesterday \
            --master data/nba_master.csv \
            --whitelist playerprops/player_whitelist.csv \
            --out data/player_game_log.csv \
            --dim data/player_dim.csv \
            --team-out data/team_game_log.csv \
            --sleep 0.25

      - name: Build player stats cards (Quant)
        run: python agents/quant.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILES="data/nba_master.csv data/player_game_log.csv data/player_dim.csv data/team_game_log.csv data/player_stats.json data/standings_today.json"
          for f in $FILES; do
            [ -f "$f" ] && cp "$f" "$f.local"
          done

          git checkout -- . 2>/dev/null || true
          git pull --rebase origin main

          for f in $FILES; do
            [ -f "$f.local" ] && mv "$f.local" "$f"
          done

          CHANGED=0
          for f in $FILES; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Daily ingest [skip ci]"
          git push origin HEAD:main
