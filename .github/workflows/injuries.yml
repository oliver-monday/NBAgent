name: Injuries Refresh

on:
  schedule:
    - cron: "45 17 * * *"   # 10:45 AM PT (PDT = UTC-7)
    - cron: "15 18 * * *"   # 11:15 AM PT
    - cron: "45 18 * * *"   # 11:45 AM PT
    - cron: "15 19 * * *"   # 12:15 PM PT
    - cron: "45 19 * * *"   # 12:45 PM PT
    - cron: "15 20 * * *"   #  1:15 PM PT
    - cron: "45 20 * * *"   #  1:45 PM PT
    - cron: "15 21 * * *"   #  2:15 PM PT
    - cron: "45 21 * * *"   #  2:45 PM PT
    - cron: "15 22 * * *"   #  3:15 PM PT
    - cron: "45 22 * * *"   #  3:45 PM PT
    - cron: "15 23 * * *"   #  4:15 PM PT
    - cron: "45 23 * * *"   #  4:45 PM PT
    - cron: "15 0 * * *"    #  5:15 PM PT
    - cron: "45 0 * * *"    #  5:45 PM PT
    - cron: "15 1 * * *"    #  6:15 PM PT
    - cron: "45 1 * * *"    #  6:45 PM PT
    - cron: "15 2 * * *"    #  7:15 PM PT
    - cron: "45 2 * * *"    #  7:45 PM PT
    - cron: "15 3 * * *"    #  8:15 PM PT
    - cron: "45 3 * * *"    #  8:45 PM PT
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: injuries-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml anthropic

      - name: Refresh Rotowire injuries
        env:
          ROTOWIRE_EMAIL: ${{ secrets.ROTOWIRE_EMAIL }}
          ROTOWIRE_PASSWORD: ${{ secrets.ROTOWIRE_PASSWORD }}
        run: |
          SLATE_DATE="$(TZ=America/Los_Angeles date +%Y-%m-%d)"
          python ingest/rotowire_injuries_only.py --date "$SLATE_DATE"

      - name: Commit injuries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase --autostash origin/main

          CHANGED=0
          for f in "data/injuries_today.json" "logs/injury_log.csv"; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "No injury changes to commit."
            exit 0
          fi

          git commit -m "Injuries refresh [skip ci]"
          git push origin HEAD:main

      - name: Run lineup watch
        run: |
          python agents/lineup_watch.py

      - name: Commit picks status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase --autostash origin/main

          if [ -n "$(git status --porcelain -- data/picks.json)" ]; then
            git add data/picks.json
            git commit -m "Lineup watch: picks status updated [skip ci]"
            git push origin HEAD:main
          else
            echo "No picks status changes to commit."
          fi

      - name: Run lineup update agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/lineup_update.py

      - name: Commit lineup amendments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase --autostash origin/main

          CHANGED=0
          for f in "data/picks.json" "data/opportunity_flags.json"; do
            if [ -f "$f" ] && [ -n "$(git status --porcelain -- "$f")" ]; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 1 ]; then
            git commit -m "Lineup update: picks amended [skip ci]"
            git push origin HEAD:main
          else
            echo "No lineup amendments to commit."
          fi

      - name: Rebuild frontend with updated injuries
        run: |
          pip install pandas
          python agents/build_site.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
